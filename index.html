<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="电子斗蛐蛐 - 一款自走棋单机网页游戏。购买棋子、布阵迎战、合成升星、激活羁绊，挑战30回合！">
    <meta name="keywords" content="自走棋,电子斗蛐蛐,网页游戏,HTML5游戏,auto chess">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta property="og:title" content="电子斗蛐蛐 - 自走棋">
    <meta property="og:description" content="一款自走棋单机网页游戏，购买棋子、布阵迎战、合成升星、激活羁绊！">
    <meta property="og:type" content="website">
    <title>电子斗蛐蛐 - 自走棋</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- AD_HEAD_PLACEHOLDER: 广告 SDK 在此引入 -->
</head>
<body>
    <div id="game-container">
        <!-- 顶部信息栏 -->
        <div id="top-bar">
            <div class="top-bar-row">
                <div class="info-group">
                    <span class="label">回合</span>
                    <span id="round-num" class="value">1</span>
                </div>
                <div class="info-group">
                    <span class="label">生命</span>
                    <div id="hp-bar-container">
                        <div id="hp-bar"></div>
                        <span id="hp-text">100</span>
                    </div>
                </div>
                <div class="info-group">
                    <span class="label">等级</span>
                    <span id="level-num" class="value">1</span>
                    <div id="xp-bar-container">
                        <div id="xp-bar"></div>
                    </div>
                </div>
                <div class="info-group gold-group">
                    <span class="label">金币</span>
                    <span id="gold-num" class="value gold-value">5</span>
                </div>
                <div class="info-group">
                    <span id="phase-text" class="phase-label">准备阶段</span>
                </div>
                <div class="info-group">
                    <button id="btn-guide" class="shop-btn guide-btn">📘 指引</button>
                    <button id="btn-achievements" class="shop-btn guide-btn">🏆 成就</button>
                    <button id="btn-feedback" class="shop-btn guide-btn">💬 建议</button>
                </div>
            </div>
        </div>

        <!-- 主游戏区域 -->
        <div id="main-area">
            <!-- 左侧羁绊面板 -->
            <div id="synergy-panel">
                <h3>羁绊</h3>
                <div id="synergy-list"></div>
            </div>

            <!-- 中间棋盘区域 -->
            <div id="board-area">
                <!-- 对手信息 -->
                <div id="enemy-info">
                    <span id="enemy-name">对手</span>
                    <span id="enemy-hp-text">HP: 100</span>
                </div>

                <!-- 对手棋盘 -->
                <div id="enemy-board" class="board-grid"></div>

                <!-- 分隔线 -->
                <div id="board-divider">
                    <span>⚔️ 战场 ⚔️</span>
                </div>

                <!-- 玩家棋盘 -->
                <div id="player-board" class="board-grid"></div>

                <!-- 备战席 -->
                <div id="bench-area">
                    <div id="bench-label">备战席</div>
                    <div id="bench-grid"></div>
                </div>
            </div>

            <!-- 右侧信息面板 -->
            <div id="info-panel">
                <div id="combat-log-container">
                    <h3>战斗日志</h3>
                    <div id="combat-log"></div>
                </div>
                <div id="unit-detail" class="hidden">
                    <h3>棋子详情</h3>
                    <div id="unit-detail-content"></div>
                </div>
            </div>
        </div>

        <!-- 移动端面板切换栏 -->
        <div id="mobile-panel-bar">
            <button id="btn-toggle-synergy" class="mobile-panel-btn">🔗 羁绊</button>
            <button id="btn-toggle-detail" class="mobile-panel-btn">📋 详情</button>
        </div>

        <!-- 移动端浮层面板 -->
        <div id="mobile-synergy-overlay" class="mobile-overlay hidden">
            <div class="mobile-overlay-content">
                <div class="mobile-overlay-header">
                    <h3>羁绊</h3>
                    <button class="mobile-overlay-close" data-close="mobile-synergy-overlay">✕</button>
                </div>
                <div id="mobile-synergy-list"></div>
            </div>
        </div>
        <div id="mobile-detail-overlay" class="mobile-overlay hidden">
            <div class="mobile-overlay-content">
                <div class="mobile-overlay-header">
                    <h3>棋子详情</h3>
                    <button class="mobile-overlay-close" data-close="mobile-detail-overlay">✕</button>
                </div>
                <div id="mobile-unit-detail-content"></div>
            </div>
        </div>

        <!-- 底部商店区域 -->
        <div id="shop-area">
            <div id="shop-units"></div>
            <div id="shop-controls">
                <button id="btn-reroll" class="shop-btn">🎲 刷新 2金(D)</button>
                <button id="btn-buy-xp" class="shop-btn">📈 买经验 4金(F)</button>
                <button id="btn-lock" class="shop-btn">🔒 锁定</button>
                <button id="btn-ready" class="shop-btn ready-btn">⚔️ 开战</button>
                <button id="btn-speed" class="shop-btn speed-btn">▶ 1x</button>
                <button id="btn-auto-arrange" class="shop-btn arrange-btn">📐 布阵</button>
                <button id="btn-sell" class="shop-btn sell-btn">💰 出售</button>
            </div>
        </div>

        <!-- 战斗结果弹窗 -->
        <div id="battle-result" class="modal hidden">
            <div class="modal-content">
                <h2 id="result-title"></h2>
                <p id="result-detail"></p>
                <div id="ad-slot-result" class="ad-slot"></div>
                <button id="btn-continue" class="shop-btn ready-btn">继续</button>
            </div>
        </div>

        <!-- 游戏结束弹窗 -->
        <div id="game-over" class="modal hidden">
            <div class="modal-content">
                <h2>游戏结束</h2>
                <p id="game-over-detail"></p>
                <div id="ad-slot-gameover" class="ad-slot"></div>
                <button id="btn-restart" class="shop-btn ready-btn">重新开始</button>
                <div class="share-hint">
                    <button id="btn-share-gameover" class="share-btn">📤 分享给朋友</button>
                </div>
            </div>
        </div>

        <!-- 新手指引弹窗 -->
        <div id="guide-modal" class="modal hidden">
            <div class="modal-content guide-content">
                <div class="guide-header">
                    <h2>新手指引</h2>
                    <button id="btn-guide-close" class="mobile-overlay-close">✕</button>
                </div>
                <div class="guide-tabs">
                    <button class="guide-tab active" data-tab="basic">基础玩法</button>
                    <button class="guide-tab" data-tab="synergy">羁绊效果</button>
                    <button class="guide-tab" data-tab="stats">属性说明</button>
                    <button class="guide-tab" data-tab="units">棋子图鉴</button>
                </div>
                <div id="guide-body" class="guide-body"></div>
            </div>
        </div>

        <!-- 成就弹窗 -->
        <div id="achievement-modal" class="modal hidden">
            <div class="modal-content guide-content">
                <div class="guide-header">
                    <h2>🏆 成就</h2>
                    <button id="btn-achievement-close" class="mobile-overlay-close">✕</button>
                </div>
                <div id="achievement-body" class="guide-body"></div>
            </div>
        </div>

        <!-- 建议反馈弹窗 -->
        <div id="feedback-modal" class="modal hidden">
            <div class="modal-content guide-content">
                <div class="guide-header">
                    <h2>💬 提交建议</h2>
                    <button id="btn-feedback-close" class="mobile-overlay-close">✕</button>
                </div>
                <div class="feedback-form">
                    <label for="feedback-name">昵称（可选）</label>
                    <input id="feedback-name" type="text" maxlength="30" placeholder="例如：热心玩家">
                    <label for="feedback-contact">联系方式（可选）</label>
                    <input id="feedback-contact" type="text" maxlength="60" placeholder="QQ / 微信 / 邮箱">
                    <label for="feedback-content">建议内容</label>
                    <textarea id="feedback-content" maxlength="500" placeholder="请输入你对游戏的建议、问题反馈或想要的新玩法..."></textarea>
                    <div class="feedback-actions">
                        <button id="btn-feedback-submit" class="shop-btn ready-btn">提交建议</button>
                        <button id="btn-feedback-clear" class="shop-btn sell-btn">清空历史</button>
                    </div>
                </div>
                <div class="guide-section-title">最近建议（本机保存）</div>
                <div id="feedback-list" class="feedback-list"></div>
            </div>
        </div>

        <!-- 开始画面 -->
        <div id="start-screen" class="modal">
            <div class="modal-content start-content">
                <h1>🦗 电子斗蛐蛐 🦗</h1>
                <p class="subtitle">自走棋单机版</p>
                <div class="game-intro">
                    <p>🛒 购买棋子，布阵迎战</p>
                    <p>⭐ 3个相同棋子合成升星</p>
                    <p>🔗 凑齐羁绊获得加成</p>
                    <p>⚔️ 棋子自动战斗</p>
                    <p>🏆 挑战30回合，生存到最后！</p>
                </div>
                <div class="difficulty-picker">
                    <label for="difficulty-select">难度：</label>
                    <select id="difficulty-select">
                        <option value="normal">普通 (100HP)</option>
                        <option value="hard">困难 (80HP, 敌+20%)</option>
                        <option value="nightmare">噩梦 (60HP, 敌+40%)</option>
                    </select>
                </div>
                <div id="ad-slot-start" class="ad-slot"></div>
                <button id="btn-start" class="shop-btn ready-btn start-btn">开始游戏</button>
                <div class="share-hint">分享给朋友一起玩 →
                    <button id="btn-share" class="share-btn">📤 分享</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 浮动伤害数字容器 -->
    <div id="floating-numbers"></div>

    <footer class="site-footer">
        <span>本页面可能展示第三方广告。</span>
        <a href="./privacy.html" target="_blank" rel="noopener noreferrer">隐私政策</a>
        <a href="./about.html" target="_blank" rel="noopener noreferrer">关于我们</a>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/game.js"></script>
    <script src="js/combat.js"></script>
    <script src="js/ads.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
