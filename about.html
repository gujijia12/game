    <main class="container">
        <h1>关于《电子斗蛐蛐》</h1>

        <div class="card">
            <p>《电子斗蛐蛐》是一款轻量级网页自走棋小游戏，目标是提供“打开即玩”的策略体验。</p>
        </div>

        <h2>项目特点</h2>
        <div class="card">
            <ul>
                <li>纯 HTML/CSS/JavaScript 构建，无需安装客户端</li>
                <li>支持电脑与手机浏览器访问</li>
                <li>单机策略玩法：升星、羁绊、经济与自动战斗</li>
            </ul>
        </div>
